---
name: acceptance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

jobs:
  acceptance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          always-auth: false
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Docker acceptance test
        run: pnpm test:docker

      - name: Run Docker Compose acceptance test
        run: pnpm test:docker:compose

      - name: Run Docker persistence acceptance test
        run: pnpm test:docker:persistence

      - name: Run Docker S3 file storage acceptance test
        run: pnpm test:docker:s3-storage

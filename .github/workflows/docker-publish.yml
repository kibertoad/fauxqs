---
name: docker-publish

on:
  push:
    tags:
      - "v*"
  workflow_call:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version
        id: meta
        run: |
          if [ -n "$GITHUB_REF_TAG" ] && echo "$GITHUB_REF_TAG" | grep -q '^v'; then
            echo "version=${GITHUB_REF_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_REF_TAG: ${{ github.ref_name }}

      - name: Build image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: fauxqs-ci-test:latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install test dependencies
        run: npm ci

      - name: Run persistence acceptance test
        run: node docker-acceptance/docker-persistence-acceptance.ts
        env:
          FAUXQS_TEST_IMAGE: fauxqs-ci-test:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            kibertoad/fauxqs:latest
            kibertoad/fauxqs:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
